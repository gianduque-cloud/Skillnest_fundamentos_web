<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>

<body>
    <h1>Crear una cuenta de Discord</h1>
    <form action="#" method="POST">
        <div>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre">
        </div>
        <br>
        <div>
            <label for="Apellido">Apellido:</label>
            <input type="text" id="Apellido" name="Apellido">
        </div>
        
        <br>
        <div>
            <label for="Correo electrónico">Correo electrónico:</label>
            <input type="text" id="Correo_electrónico" name="Correo_electrónico">
        </div>
        <br>
        <div>
            <label for="clave">Contraseña:</label>
            <input type="password" id="clave" name="clave">
        </div>
        <br>
        <div>
            <label for="clave">Confirmar Contraseña</label>
            <input type="password" id="clave" name="clave">
        </div>
        <br>
        <div>
            <label for="fecha_nacimiento">Fecha de nacimiento:</label>
            <input type="date" id="fecha_nacimiento" name="fecha_nacimiento">
        </div>
        <br>
        <div>
            <label>Genero:</label>
            <input type="radio" id="Masculino" name="Genero" value="normal">
            <label for="Masculino">Masculino</label>
            <input type="radio" id="Femenino" name="Genero" value="normal">
            <label for="Femenino">Femenino</label>
            <input type="radio" id="Prefiero no decirlo" name="Genero" value="normal">
            <label for="Prefiero no decirlo">Prefiero no decirlo</label>
        </div>
        <br>
        <div>
            <label for="comentario">Descripción sobre ti:</label>
            <br>
            <textarea id="comentario" name="comentario" rows="4" cols="30"></textarea>
        </div>
        <br>
        <div>
            <label for="intereses">Selecciona tus intereses:</label>
            <br>
            <select id="intereses" name="intereses">
                <option value="Música">Música</option>
                <option value="Peliculas">Peliculas</option>
                <option value="Deporte">Deporte</option>
                <option value="Tecnología">Tecnología</option>
            </select>
        </div>
        <br>
        <div>
            <input type="checkbox" id="acepto" name="acepto">
            <label for="acepto">Acepto los <a href="https://discord.com/terms">términos y condiciones</a> de Discord</label>
        </div>
        <input type="submit" value="Registrarse">
    </form>
</body>

</html>
